<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>母亲节快乐</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden;touch-action:pan-y;background:#fce4ec}

/* ===== 封面 ===== */
.cover{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:linear-gradient(160deg,#fce4ec 0%,#f8bbd0 40%,#e91e63 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:10;transition:transform 0.8s cubic-bezier(0.55,0,0.45,1),opacity 0.6s 0.2s;
}
.cover.hidden{transform:translateY(-105%) rotateX(15deg) scale(0.9);opacity:0;pointer-events:none}
.cover-shine{
  position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(circle,rgba(255,255,255,0.4) 0%,transparent 60%);
  pointer-events:none;opacity:0;
}
.cover.opening .cover-shine{animation:shineFlash 0.6s ease-out forwards}
@keyframes shineFlash{0%{opacity:0;transform:scale(0.5)}50%{opacity:1}100%{opacity:0;transform:scale(1.5)}}
.cover-icon{font-size:90px;animation:coverBeat 1s infinite}
.cover-title{font-size:34px;color:#fff;font-weight:bold;margin:16px 0 8px;letter-spacing:6px;text-shadow:0 2px 8px rgba(0,0,0,0.1)}
.cover-subtitle{font-size:16px;color:rgba(255,255,255,0.9);letter-spacing:3px}
.cover-hint{margin-top:60px;font-size:13px;color:rgba(255,255,255,0.75);animation:bounce 1.5s infinite;text-align:center}
.cover-hint span{display:inline-block;animation:arrowUp 1.5s infinite}
.cover-hint span:nth-child(2){animation-delay:0.15s}
.cover-hint span:nth-child(3){animation-delay:0.3s}
@keyframes coverBeat{0%,100%{transform:scale(1)}15%{transform:scale(1.12)}30%{transform:scale(1)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}
@keyframes arrowUp{0%,100%{opacity:0.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-6px)}}

/* ===== 内容区 ===== */
.content{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:linear-gradient(180deg,#fff5f5 0%,#ffebee 30%,#fce4ec 100%);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  z-index:5;padding-bottom:30px;
}
.content .fade-in{opacity:0;animation:fadeSlideUp 0.6s ease-out forwards}
@keyframes fadeSlideUp{0%{opacity:0;transform:translateY(30px)}100%{opacity:1;transform:translateY(0)}}

/* 粒子爆发 */
.burst-particle{
  position:fixed;pointer-events:none;z-index:20;
  animation:burst 1s ease-out forwards;
}
@keyframes burst{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}

/* ===== 照片区 ===== */
.photo-section{padding:35px 20px 25px;text-align:center}
.photo-stack{
  position:relative;display:inline-block;
  width:88%;max-width:280px;overflow:hidden;border-radius:14px;
}
/* 4:5 竖屏比例，所有照片统一 */
.photo-stack::before{content:'';display:block;padding-top:125%}
.photo-card{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:#eee;border-radius:14px;
  box-shadow:0 6px 28px rgba(0,0,0,0.1);
  transition:transform 0.45s cubic-bezier(0.4,0,0.2,1),opacity 0.45s;
  cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;
  overflow:hidden;
}
.photo-card img{width:100%;height:100%;object-fit:cover;display:block}
/* 非展示卡片略微暗去 */
.photo-card{opacity:0}
/* 默认：第1张展示 */
.photo-card:nth-child(1){z-index:40;transform:none;opacity:1}
.photo-card:nth-child(2){z-index:30;transform:rotate(2deg) translateX(8px) translateY(4px);opacity:0.3}
.photo-card:nth-child(3){z-index:20;transform:rotate(-2.5deg) translateX(-6px) translateY(8px);opacity:0.15}
.photo-card:nth-child(4){z-index:10;transform:rotate(1.5deg) translateX(4px) translateY(12px);opacity:0}
/* pos2 */
.photo-stack.pos2 .photo-card:nth-child(1){z-index:10;transform:rotate(1.5deg) translateX(4px) translateY(12px);opacity:0}
.photo-stack.pos2 .photo-card:nth-child(2){z-index:40;transform:none;opacity:1}
.photo-stack.pos2 .photo-card:nth-child(3){z-index:30;transform:rotate(2deg) translateX(8px) translateY(4px);opacity:0.3}
.photo-stack.pos2 .photo-card:nth-child(4){z-index:20;transform:rotate(-2.5deg) translateX(-6px) translateY(8px);opacity:0.15}
/* pos3 */
.photo-stack.pos3 .photo-card:nth-child(1){z-index:20;transform:rotate(-2.5deg) translateX(-6px) translateY(8px);opacity:0.15}
.photo-stack.pos3 .photo-card:nth-child(2){z-index:10;transform:rotate(1.5deg) translateX(4px) translateY(12px);opacity:0}
.photo-stack.pos3 .photo-card:nth-child(3){z-index:40;transform:none;opacity:1}
.photo-stack.pos3 .photo-card:nth-child(4){z-index:30;transform:rotate(2deg) translateX(8px) translateY(4px);opacity:0.3}
/* pos4 */
.photo-stack.pos4 .photo-card:nth-child(1){z-index:30;transform:rotate(2deg) translateX(8px) translateY(4px);opacity:0.3}
.photo-stack.pos4 .photo-card:nth-child(2){z-index:20;transform:rotate(-2.5deg) translateX(-6px) translateY(8px);opacity:0.15}
.photo-stack.pos4 .photo-card:nth-child(3){z-index:10;transform:rotate(1.5deg) translateX(4px) translateY(12px);opacity:0}
.photo-stack.pos4 .photo-card:nth-child(4){z-index:40;transform:none;opacity:1}
.photo-hint{margin-top:50px;font-size:12px;color:#c62828;opacity:0.7;animation:bounce 2s infinite}

/* ===== 祝福语 ===== */
.message-section{padding:25px 24px;text-align:center}
.message-card{
  background:white;border-radius:14px;padding:30px 22px;
  box-shadow:0 4px 24px rgba(233,30,99,0.08);
  line-height:2.3;font-size:17px;color:#4a148c;
}
.message-card .highlight{color:#e91e63;font-weight:bold}
.message-card .sign{margin-top:24px;text-align:right;color:#9c27b0;font-weight:bold;font-size:16px}
.message-card .quote{display:block;margin:12px 0;padding:8px 0;border-top:1px solid rgba(233,30,99,0.12);border-bottom:1px solid rgba(233,30,99,0.12);font-size:15px;color:#ad1457;font-style:italic}

/* ===== 音乐 ===== */
.music-section{padding:10px 28px 40px;text-align:center}
.music-btn{
  display:inline-flex;align-items:center;gap:10px;
  padding:16px 32px;border-radius:30px;
  background:white;box-shadow:0 2px 16px rgba(233,30,99,0.12);
  cursor:pointer;border:none;font-size:16px;color:#e91e63;
  -webkit-tap-highlight-color:transparent;transition:all 0.3s;outline:none;
}
.music-btn:active{transform:scale(0.95);background:#fce4ec}
.music-btn.playing{background:#fce4ec;box-shadow:0 2px 20px rgba(233,30,99,0.2)}
.music-btn .icon{font-size:24px}
.music-btn .waves{display:none;gap:3px;align-items:flex-end;height:20px}
.music-btn.playing .waves{display:flex}
.music-btn .waves span{width:2px;background:#e91e63;border-radius:1px;animation:wave 0.5s ease-in-out infinite}
.music-btn .waves span:nth-child(2){animation-delay:0.15s;height:14px}
.music-btn .waves span:nth-child(3){animation-delay:0.3s;height:18px}
.music-btn .waves span:nth-child(4){animation-delay:0.45s;height:10px}
@keyframes wave{0%,100%{height:6px}50%{height:20px}}

/* ===== 花瓣 ===== */
.petals-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2}
.petal{position:absolute;animation:petalFall linear infinite}
@keyframes petalFall{
  0%{transform:translateY(0) translateX(0) rotate(0deg) scale(1);opacity:0.9}
  25%{transform:translateY(25vh) translateX(var(--drift,20px)) rotate(90deg)}
  50%{transform:translateY(50vh) translateX(calc(var(--drift,20px)*-0.5)) rotate(200deg)}
  75%{transform:translateY(75vh) translateX(var(--drift,20px)) rotate(300deg)}
  100%{transform:translateY(105vh) translateX(0) rotate(360deg) scale(0.3);opacity:0}
}

/* ===== 浮爱心 ===== */
.hearts-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
.floating-heart{position:absolute;bottom:-30px;animation:heartRise linear forwards}
@keyframes heartRise{0%{transform:translateY(0) rotate(0deg) scale(0.5);opacity:0}20%{opacity:0.7}100%{transform:translateY(-110vh) rotate(180deg) scale(1);opacity:0}}
</style>
</head>
<body>

<div class="petals-container" id="petals"></div>
<div class="hearts-container" id="hearts"></div>

<!-- 封面 -->
<div class="cover" id="cover">
  <div class="cover-shine"></div>
  <div class="cover-icon">💐</div>
  <div class="cover-title">母亲节快乐</div>
  <div class="cover-subtitle">Happy Mother's Day</div>
  <div class="cover-hint">
    <span>▲</span><span>▲</span><span>▲</span>
    <br>点击或上滑打开
  </div>
</div>

<!-- 内容 -->
<div class="content" id="mainContent">

  <div class="photo-section fade-in">
    <div class="photo-stack" id="photoStack">
      <div class="photo-card"><img src="https://cdn.jsdelivr.net/gh/1185816067-pixel/mothers-day@main/41aebe053368c0b30f32d114e580b974.jpg" alt="妈妈"></div>
      <div class="photo-card"><img src="https://cdn.jsdelivr.net/gh/1185816067-pixel/mothers-day@main/合照.jpg" alt="合照1"></div>
      <div class="photo-card"><img src="https://cdn.jsdelivr.net/gh/1185816067-pixel/mothers-day@main/bcc72a3875a3e6a4fe8e5508c5acf465.jpg" alt="合照2"></div>
      <div class="photo-card"><img src="https://cdn.jsdelivr.net/gh/1185816067-pixel/mothers-day@main/34edfca1f24e6be9342eda9767459290.jpg" alt="合照3"></div>
    </div>
    <div class="photo-hint">👆 点击照片翻看下一张</div>
  </div>

  <div class="message-section fade-in">
    <div class="message-card">
      <span>亲爱的<span class="highlight">刘女士</span>：</span>
      <span style="display:block;margin-top:8px">母亲节快乐！</span>
      <span class="quote">宇宙洪荒，生命浩瀚<br>但只有你和我<br>真正分享过心跳</span>
      <span>过去你扶我蹒跚学步，</span>
      <span>未来我陪你夕阳漫步。</span>
      <span style="display:block;margin-top:8px">感谢您一直以来的付出、包容和爱，</span>
      <span>您的爱是我生命中最温暖的力量。</span>
      <span style="display:block;margin-top:8px">祝您永远健康、美丽、快乐！</span>
      <div class="sign">—— 永远爱您的大儿子</div>
    </div>
  </div>

  <div class="music-section fade-in">
    <button class="music-btn" id="musicBtn">
      <span class="icon">🎵</span>
      <span id="musicLabel">播放音乐</span>
      <span class="waves"><span></span><span></span><span></span><span></span></span>
    </button>
  </div>
</div>

<script>
// ===== 打开贺卡 =====
let isOpen=false,startY=0;
const coverEl=document.getElementById('cover');
function openCard(){
  if(isOpen)return;isOpen=true;
  coverEl.classList.add('opening');
  spawnBurst();
  setTimeout(()=>coverEl.classList.add('hidden'),500);
  document.querySelectorAll('.content .fade-in').forEach((el,i)=>{
    el.style.animationDelay=(0.3+i*0.2)+'s';
  });
  setTimeout(()=>tryPlayMusic(),400);
}
coverEl.addEventListener('click',openCard);
coverEl.addEventListener('touchstart',e=>{if(!isOpen)startY=e.touches[0].clientY},{passive:true});
coverEl.addEventListener('touchmove',e=>{if(!isOpen&&startY-e.touches[0].clientY>40)openCard()},{passive:true});

function spawnBurst(){
  const p=['❤️','💕','✨','💖','🌸','🌟','💝','🌷'];
  const cx=window.innerWidth/2,cy=window.innerHeight/2;
  for(let i=0;i<24;i++){
    const el=document.createElement('span');
    el.className='burst-particle';
    el.textContent=p[Math.floor(Math.random()*p.length)];
    el.style.left=cx+'px';el.style.top=cy+'px';
    el.style.fontSize=16+Math.random()*28+'px';
    el.style.setProperty('--dx',(Math.random()-0.5)*300+'px');
    el.style.setProperty('--dy',(Math.random()-0.5)*400-100+'px');
    el.style.animationDuration=0.8+Math.random()*0.8+'s';
    el.style.animationDelay=Math.random()*0.2+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2000);
  }
}

// ===== 照片切换 =====
let photoIdx=1;const totalPhotos=4;
const photoStack=document.getElementById('photoStack');
photoStack.addEventListener('click',()=>{
  photoIdx=photoIdx%totalPhotos+1;
  photoStack.className='photo-stack pos'+photoIdx;
});

// ===== 音乐 =====
let musicPlaying=false;
const musicBtn=document.getElementById('musicBtn');
const musicLabel=document.getElementById('musicLabel');
let extAudio=null;

function tryPlayMusic(){
  const a=new Audio();a.src='https://cdn.jsdelivr.net/gh/1185816067-pixel/mothers-day@main/music.mp3';a.loop=true;
  a.play().then(()=>{
    extAudio=a;musicPlaying=true;
    musicBtn.classList.add('playing');musicLabel.textContent='暂停音乐';
  }).catch(()=>{startMelody();musicPlaying=true;musicBtn.classList.add('playing');musicLabel.textContent='暂停音乐'});
}

function toggleMusic(){
  if(extAudio){
    if(musicPlaying){extAudio.pause();musicBtn.classList.remove('playing');musicLabel.textContent='播放音乐'}
    else{extAudio.play().catch(()=>{});musicBtn.classList.add('playing');musicLabel.textContent='暂停音乐'}
    musicPlaying=!musicPlaying;
  }else{
    if(musicPlaying){stopMelody();musicBtn.classList.remove('playing');musicLabel.textContent='播放音乐'}
    else{startMelody();musicBtn.classList.add('playing');musicLabel.textContent='暂停音乐'}
    musicPlaying=!musicPlaying;
  }
}
musicBtn.addEventListener('click',e=>{e.stopPropagation();toggleMusic()});

// 内置钢琴旋律
let audioCtx=null,gainNode=null,melodyTimer=null;
const melody=[261,293,329,349,329,293,261,329,349,392,349,329,293,261,392,392,440,392,349,329,349,329,293,261,293,261];
function playNote(freq,start,dur,vol){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='sine';o.frequency.value=freq;
  g.gain.setValueAtTime(0,start);g.gain.linearRampToValueAtTime(vol,start+0.05);g.gain.exponentialRampToValueAtTime(0.001,start+dur);
  o.connect(g);g.connect(gainNode);o.start(start);o.stop(start+dur);
}
function startMelody(){
  if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)();gainNode=audioCtx.createGain();gainNode.gain.value=0.3;gainNode.connect(audioCtx.destination)}
  const now=audioCtx.currentTime;let t=now;
  melody.forEach((f,i)=>{playNote(f,t,0.35,0.25);t+=0.38});
  melodyTimer=setTimeout(startMelody,melody.length*380+800);
}
function stopMelody(){if(melodyTimer){clearTimeout(melodyTimer);melodyTimer=null}if(audioCtx){audioCtx.close();audioCtx=null;gainNode=null}}

// ===== 花瓣(50个) =====
const petals=['🌸','💮','🌷','🌺','💐','🌼','🏵️','🌻','💠','🪷'];
const pc=document.getElementById('petals');
for(let i=0;i<50;i++){
  const p=document.createElement('span');p.className='petal';
  p.textContent=petals[Math.floor(Math.random()*petals.length)];
  p.style.left=Math.random()*100+'%';p.style.top=-(Math.random()*60)+'px';
  p.style.fontSize=10+Math.random()*28+'px';
  p.style.animationDuration=4+Math.random()*12+'s';
  p.style.animationDelay=Math.random()*10+'s';
  p.style.setProperty('--drift',(Math.random()-0.5)*80+'px');
  pc.appendChild(p);
}

// ===== 浮爱心 =====
const hc=document.getElementById('hearts');
function spawnHeart(){
  const h=document.createElement('span');h.className='floating-heart';
  h.textContent=Math.random()>0.5?'❤':'💕';
  h.style.left=5+Math.random()*90+'%';
  h.style.fontSize=10+Math.random()*20+'px';
  h.style.animationDuration=4+Math.random()*7+'s';
  hc.appendChild(h);setTimeout(()=>h.remove(),11000);
}
setInterval(spawnHeart,700);
for(let i=0;i<6;i++)setTimeout(spawnHeart,i*250);
</script>
</body>
</html>
